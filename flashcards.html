<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phrasal Verbs – Flashcards</title>
<style>
  :root {
    --primary:      #4f46e5;
    --primary-dk:   #4338ca;
    --primary-lt:   #c7d2fe;
    --accent:       #818cf8;
    --bg:           #f1f5f9;
    --surface:      #ffffff;
    --text:         #1e293b;
    --muted:        #64748b;
    --border:       #e2e8f0;
    --shadow-sm:    0 1px 4px rgba(0,0,0,.07);
    --shadow-card:  0 8px 32px rgba(79,70,229,.10), 0 2px 8px rgba(0,0,0,.06);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 28px 16px 56px;
  }

  /* ── Header ──────────────────────────────────── */
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 1.65rem; font-weight: 800; color: var(--primary); letter-spacing: -.02em; }
  header p  { font-size: .82rem; color: var(--muted); margin-top: 3px; }

  /* ── Settings ────────────────────────────────── */
  .settings-bar { max-width: 560px; margin: 0 auto 20px; }

  .settings-trigger {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; font-size: .85rem; font-weight: 600; color: var(--muted);
    user-select: none; padding: 4px 0;
  }
  .settings-trigger:hover { color: var(--primary); }
  .settings-trigger .chev { display: inline-block; transition: transform .22s; }
  .settings-trigger.open .chev { transform: rotate(90deg); }

  .settings-panel {
    display: none; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; margin-top: 10px; box-shadow: var(--shadow-sm);
  }
  .settings-panel.open { display: block; }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    display: block; font-size: .71rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 7px;
  }
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; }

  input[type="text"], input[type="number"], select {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
    border-radius: 9px; font-size: .92rem; color: var(--text); background: #fff; outline: none;
    transition: border-color .18s;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--primary); }
  input[type="number"] { width: 80px; }
  input[type="file"]   { font-size: .83rem; color: var(--muted); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }

  .divider {
    display: flex; align-items: center; gap: 10px; margin: 10px 0;
    font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em;
  }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border); }

  /* Toggle */
  .toggle-row {
    display: flex; align-items: center; gap: 10px;
    font-size: .9rem; color: var(--text); cursor: pointer; user-select: none;
  }
  .switch {
    position: relative; width: 42px; height: 23px;
    background: var(--border); border-radius: 12px; flex-shrink: 0; transition: background .2s;
  }
  .switch::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 17px; height: 17px; background: #fff;
    border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.2); transition: transform .2s;
  }
  .switch.on { background: var(--primary); }
  .switch.on::after { transform: translateX(19px); }

  /* Mode pills */
  .pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    padding: 7px 16px; border: 2px solid var(--border); border-radius: 999px;
    font-size: .84rem; font-weight: 600; color: var(--muted);
    cursor: pointer; transition: all .15s; user-select: none; white-space: nowrap;
  }
  .pill.active { border-color: var(--primary); background: #eef2ff; color: var(--primary); }

  /* Buttons */
  .btn {
    padding: 9px 20px; border: none; border-radius: 9px;
    font-size: .92rem; font-weight: 700; cursor: pointer;
    transition: all .15s; white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dk); }
  .btn-ghost {
    background: #fff; border: 1.5px solid var(--border);
    color: var(--text); box-shadow: var(--shadow-sm);
  }
  .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

  /* ── Status ──────────────────────────────────── */
  .status {
    max-width: 560px; margin: 0 auto 14px; padding: 10px 14px;
    border-radius: 9px; font-size: .84rem; font-weight: 500; display: none;
  }
  .status.show { display: block; }
  .status.ok  { background: #d1fae5; color: #065f46; }
  .status.err { background: #fee2e2; color: #b91c1c; }

  /* ── Session header ──────────────────────────── */
  .session-header {
    max-width: 560px; margin: 0 auto 12px;
    display: flex; justify-content: center; align-items: center; gap: 10px;
  }
  .pill-count {
    font-size: .82rem; font-weight: 700;
    padding: 4px 13px; border-radius: 999px;
  }
  .pill-count.c-again  { background: #fee2e2; color: #b91c1c; }
  .pill-count.c-review { background: #ede9fe; color: #5b21b6; }
  .pill-count.c-new    { background: #fef9c3; color: #854d0e; }

  /* ── Progress ────────────────────────────────── */
  .progress-track {
    max-width: 560px; margin: 0 auto 18px;
    height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--primary); border-radius: 2px; transition: width .35s ease;
  }

  /* ── Card ────────────────────────────────────── */
  .card-wrap {
    perspective: 1200px; max-width: 560px; height: 270px;
    margin: 0 auto 20px; cursor: pointer;
  }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform .52s cubic-bezier(.4,0,.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    background: var(--surface); border-radius: 18px;
    box-shadow: var(--shadow-card); border: 1px solid var(--border);
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 28px 36px; text-align: center;
  }
  .back-face {
    transform: rotateY(180deg);
    justify-content: flex-start; padding-top: 28px;
  }
  .card-category {
    position: absolute; top: 14px; right: 14px;
    font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    background: var(--primary-lt); color: var(--primary);
    padding: 3px 9px; border-radius: 999px;
  }
  .card-tag {
    font-size: .7rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: .1em; color: var(--accent); margin-bottom: 14px;
  }
  .card-verb       { font-size: 2rem; font-weight: 800; color: var(--text); letter-spacing: -.02em; line-height: 1.2; }
  .card-meaning    { font-size: 1rem; font-weight: 500; color: var(--text); line-height: 1.55; }
  .card-tap-hint   { margin-top: 20px; font-size: .75rem; color: var(--muted); }
  .card-verb-ans   { font-size: 2rem; font-weight: 800; color: var(--primary); letter-spacing: -.02em; }
  .card-example    {
    margin-top: 14px; font-size: .86rem; font-style: italic;
    color: var(--muted); line-height: 1.55;
    border-top: 1px solid var(--border); padding-top: 12px; width: 100%;
  }

  /* ── Rating area ─────────────────────────────── */
  .rating-area { max-width: 560px; margin: 0 auto; display: none; }
  .rate-prompt {
    text-align: center; font-size: .76rem; color: var(--muted); margin-bottom: 10px;
  }
  .rate-buttons { display: flex; gap: 8px; justify-content: center; }
  .rate-btn {
    flex: 1; max-width: 128px; display: flex; flex-direction: column;
    align-items: center; gap: 5px; padding: 12px 6px;
    border: none; border-radius: 12px; cursor: pointer;
    transition: filter .15s, transform .1s; font-family: inherit;
  }
  .rate-btn:active { transform: scale(.96); }
  .rate-label { font-size: .88rem; font-weight: 700; }
  .rate-int   { font-size: .7rem; opacity: .75; }
  .r-again { background: #fee2e2; color: #b91c1c; }
  .r-again:hover { filter: brightness(.93); }
  .r-hard  { background: #ffedd5; color: #9a3412; }
  .r-hard:hover  { filter: brightness(.93); }
  .r-good  { background: #dcfce7; color: #14532d; }
  .r-good:hover  { filter: brightness(.93); }
  .r-easy  { background: #dbeafe; color: #1e40af; }
  .r-easy:hover  { filter: brightness(.93); }
  .kbd-hint {
    text-align: center; margin-top: 10px;
    font-size: .7rem; color: var(--muted);
  }
  kbd {
    display: inline-block; padding: 1px 5px;
    border: 1px solid var(--border); border-radius: 4px;
    background: #fff; font-size: .68rem; font-family: inherit;
  }

  /* ── Screens (empty / caught-up / complete) ──── */
  .screen {
    text-align: center; padding: 52px 24px;
    max-width: 480px; margin: 0 auto;
  }
  .screen-icon { font-size: 3.2rem; margin-bottom: 14px; }
  .screen h2   { font-size: 1.25rem; font-weight: 800; margin-bottom: 8px; }
  .screen p    { font-size: .88rem; color: var(--muted); line-height: 1.6; }
  .screen .sub { margin-top: 6px; }
  .screen .sub strong { color: var(--text); }

  .stat-row { display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .stat {
    padding: 6px 14px; border-radius: 8px; font-size: .84rem;
    display: flex; align-items: center; gap: 5px;
  }
  .stat-again { background: #fee2e2; color: #b91c1c; }
  .stat-hard  { background: #ffedd5; color: #9a3412; }
  .stat-good  { background: #dcfce7; color: #14532d; }
  .stat-easy  { background: #dbeafe; color: #1e40af; }
</style>
</head>
<body>

<header>
  <h1>Phrasal Verbs</h1>
  <p>Spaced repetition flashcards</p>
</header>

<!-- ── Settings ───────────────────────────────────── -->
<div class="settings-bar">
  <div class="settings-trigger" id="strig" onclick="toggleSettings()">
    <span class="chev">▶</span> Settings
  </div>
  <div class="settings-panel" id="spanel">

    <div class="field">
      <span class="field-label">Google Sheets URL (publish to web first) or CSV URL</span>
      <div class="input-row">
        <input type="text" id="csv-url" placeholder="Paste Google Sheets or CSV URL…">
        <button class="btn btn-primary" onclick="loadFromUrl()">Load</button>
      </div>
    </div>

    <div class="divider">or</div>

    <div class="field">
      <span class="field-label">Local CSV file</span>
      <input type="file" id="csv-file" accept=".csv" onchange="loadFromFile()">
    </div>

    <div class="two-col">
      <div class="field">
        <span class="field-label">Category</span>
        <select id="cat-sel" onchange="onCatChange()">
          <option value="all">All categories</option>
        </select>
      </div>
      <div class="field">
        <span class="field-label">Apply category filter</span>
        <div class="toggle-row" onclick="toggleFilter()">
          <div class="switch" id="fsw"></div>
          <span id="flbl">Off</span>
        </div>
      </div>
    </div>

    <div class="two-col">
      <div class="field">
        <span class="field-label">Study mode</span>
        <div class="pills">
          <div class="pill active" data-mode="verb-first"    onclick="setMode('verb-first')">Verb → Meaning</div>
          <div class="pill"        data-mode="meaning-first" onclick="setMode('meaning-first')">Meaning → Verb</div>
          <div class="pill"        data-mode="mixed"         onclick="setMode('mixed')">Mixed</div>
        </div>
      </div>
      <div class="field">
        <span class="field-label">New cards per day</span>
        <input type="number" id="npd" min="1" max="100" value="10" onchange="LS.set('npd', this.value)">
      </div>
    </div>

    <div class="field" style="margin-top:4px">
      <button class="btn btn-ghost" onclick="resetProgress()" style="font-size:.82rem;padding:7px 14px">
        Reset all progress
      </button>
    </div>

  </div>
</div>

<!-- ── Status ─────────────────────────────────────── -->
<div class="status" id="status"></div>

<!-- ── App ───────────────────────────────────────── -->
<div id="app">
  <div class="screen">
    <div class="screen-icon">📖</div>
    <h2>No cards loaded</h2>
    <p>Open <strong>Settings</strong> above and load a file to begin.</p>
  </div>
</div>

<script>
// ── localStorage ─────────────────────────────────────────────────────────────
const LS = {
  get: k       => localStorage.getItem('pv__' + k),
  set: (k, v)  => localStorage.setItem('pv__' + k, String(v)),
};
function loadSRS() {
  try { return JSON.parse(localStorage.getItem('pv__srs') || '{}'); } catch { return {}; }
}
function saveSRS(d) { localStorage.setItem('pv__srs', JSON.stringify(d)); }

// ── Date helpers ─────────────────────────────────────────────────────────────
const TODAY = new Date().toISOString().slice(0, 10);
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function fmtInterval(days) {
  if (days <= 0)  return 'now';
  if (days === 1) return '1 day';
  if (days < 30)  return `${days} days`;
  if (days < 365) return `${Math.round(days / 30)} mo`;
  return `${(days / 365).toFixed(1)} y`;
}

// ── SRS engine ───────────────────────────────────────────────────────────────
// Ratings: 0=Again  1=Hard  2=Good  3=Easy
function defaultRec()          { return { ef: 2.5, interval: 0, reps: 0, due: null, lapses: 0 }; }
function cardKey(card)         { return card.verb.toLowerCase().trim(); }
function getRec(srs, card)     { return srs[cardKey(card)] || defaultRec(); }

function calcNext(rec, quality) {
  // Returns a copy with the grade applied — does NOT mutate rec
  const r = { ...rec };
  applyGrade(r, quality);
  return r;
}

function applyGrade(rec, quality) {
  if (quality === 0) {
    // Again: reset streak, ease drops, due tomorrow
    rec.ef       = Math.max(1.3, rec.ef - 0.20);
    rec.interval = 1;
    rec.reps     = 0;
    rec.lapses   = (rec.lapses || 0) + 1;
  } else {
    // Hard / Good / Easy: advance interval
    if      (rec.reps === 0) rec.interval = 1;
    else if (rec.reps === 1) rec.interval = 6;
    else {
      const mult = quality === 1 ? 1.2
                 : quality === 2 ? rec.ef
                 : rec.ef * 1.3;
      rec.interval = Math.max(1, Math.round(rec.interval * mult));
    }
    const efDelta = quality === 1 ? -0.15 : quality === 3 ? 0.15 : 0;
    rec.ef  = Math.max(1.3, rec.ef + efDelta);
    rec.reps++;
  }
  rec.due = addDays(TODAY, quality === 0 ? 1 : rec.interval);
}

// ── New-cards-today quota ─────────────────────────────────────────────────────
function getNewUsed() {
  try {
    const d = JSON.parse(localStorage.getItem('pv__newToday') || '{}');
    return d.date === TODAY ? (d.count || 0) : 0;
  } catch { return 0; }
}
function addNewUsed(n) {
  localStorage.setItem('pv__newToday', JSON.stringify({ date: TODAY, count: getNewUsed() + n }));
}

// ── App state ─────────────────────────────────────────────────────────────────
let allCards  = [];
let mode      = 'verb-first';
let useFilter = false;

// Session
let queue     = [];   // [{card, vFirst, isNew}]
let qIdx      = 0;
let againBuf  = [];   // cards that got "Again" this round
let flipped   = false;
let stats     = { again: 0, hard: 0, good: 0, easy: 0 };
let totalSeen = 0;    // cards rated this session (for progress bar denominator)

// ── Pool ──────────────────────────────────────────────────────────────────────
function getPool() {
  const cat = document.getElementById('cat-sel').value;
  return (useFilter && cat !== 'all')
    ? allCards.filter(c => c.category === cat)
    : [...allCards];
}

// ── Session building ──────────────────────────────────────────────────────────
function countRemainingNew() {
  const srs = loadSRS();
  return getPool().filter(c => !getRec(srs, c).due).length;
}

function buildSession(bonusNew = 0) {
  const srs      = loadSRS();
  const pool     = getPool();
  const npd      = Math.max(1, parseInt(LS.get('npd') || '10'));
  const newSlots = Math.max(0, npd - getNewUsed()) + bonusNew;

  const dueCards = pool.filter(c => {
    const r = getRec(srs, c);
    return r.due && r.due <= TODAY;
  });

  const newCards = pool
    .filter(c => !getRec(srs, c).due)
    .slice(0, newSlots);

  if (!dueCards.length && !newCards.length) return false;

  // Commit new-card quota immediately
  if (newCards.length) addNewUsed(newCards.length);

  // Interleave: 1 new card every 5 due cards
  const combined = [...dueCards];
  newCards.forEach((c, i) => {
    const pos = Math.min(combined.length, (i + 1) * 5 - 1);
    combined.splice(pos, 0, c);
  });

  queue    = combined.map(card => ({ card, vFirst: pickVFirst(), isNew: !getRec(srs, card).due }));
  againBuf = [];
  stats    = { again: 0, hard: 0, good: 0, easy: 0 };
  qIdx     = 0;
  flipped  = false;
  totalSeen = 0;

  return true;
}

function pickVFirst() {
  if (mode === 'verb-first')    return true;
  if (mode === 'meaning-first') return false;
  return Math.random() < 0.5;
}

// ── Rating ────────────────────────────────────────────────────────────────────
function rate(quality) {
  const item = queue[qIdx];
  const srs  = loadSRS();
  const k    = cardKey(item.card);
  const rec  = srs[k] || defaultRec();

  applyGrade(rec, quality);
  srs[k] = rec;
  saveSRS(srs);

  const labels = ['again', 'hard', 'good', 'easy'];
  stats[labels[quality]]++;
  totalSeen++;

  if (quality === 0) againBuf.push({ ...item, vFirst: pickVFirst() });

  qIdx++;
  flipped = false;

  if (qIdx >= queue.length) {
    if (againBuf.length) {
      queue    = [...againBuf];
      againBuf = [];
      qIdx     = 0;
    } else {
      renderComplete();
      return;
    }
  }

  renderSession();
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderApp() {
  if (!allCards.length) { renderEmpty(); return; }
  if (!buildSession()) { renderCaughtUp(); return; }
  renderSession();
}

function renderEmpty() {
  document.getElementById('app').innerHTML = `
    <div class="screen">
      <div class="screen-icon">📖</div>
      <h2>No cards loaded</h2>
      <p>Open <strong>Settings</strong> above and load a file to begin.</p>
    </div>`;
}

function renderCaughtUp() {
  const srs      = loadSRS();
  const pool     = getPool();
  const tomorrow = addDays(TODAY, 1);
  const due2moro = pool.filter(c => getRec(srs, c).due === tomorrow).length;
  const moreNew  = countRemainingNew();
  const npd      = Math.max(1, parseInt(LS.get('npd') || '10'));

  document.getElementById('app').innerHTML = `
    <div class="screen">
      <div class="screen-icon">🎉</div>
      <h2>All caught up!</h2>
      <p>No cards due today. Come back tomorrow.</p>
      ${due2moro ? `<p class="sub">Due tomorrow: <strong>${due2moro}</strong></p>` : ''}
      ${moreNew   ? `<p class="sub">New cards waiting: <strong>${moreNew}</strong></p>` : ''}
      ${moreNew   ? `<button class="btn btn-ghost" style="margin-top:20px" onclick="studyMore()">
                       + Study ${Math.min(npd, moreNew)} more new cards
                     </button>` : ''}
    </div>`;
}

function renderComplete() {
  const total   = stats.again + stats.hard + stats.good + stats.easy;
  const moreNew = countRemainingNew();
  const npd     = Math.max(1, parseInt(LS.get('npd') || '10'));

  document.getElementById('app').innerHTML = `
    <div class="screen">
      <div class="screen-icon">✅</div>
      <h2>Session complete!</h2>
      <p>You rated <strong>${total}</strong> card${total !== 1 ? 's' : ''} today.</p>
      <div class="stat-row">
        <span class="stat stat-again">Again <strong>${stats.again}</strong></span>
        <span class="stat stat-hard">Hard <strong>${stats.hard}</strong></span>
        <span class="stat stat-good">Good <strong>${stats.good}</strong></span>
        <span class="stat stat-easy">Easy <strong>${stats.easy}</strong></span>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap">
        ${moreNew ? `<button class="btn btn-ghost" onclick="studyMore()">
                       + Study ${Math.min(npd, moreNew)} more new cards
                     </button>` : ''}
        <button class="btn btn-primary" onclick="renderApp()">Study again</button>
      </div>
    </div>`;
}

function studyMore() {
  const npd = Math.max(1, parseInt(LS.get('npd') || '10'));
  if (!buildSession(npd)) {
    showStatus('No more new cards available.', 'ok', 2000);
    return;
  }
  renderSession();
}

function renderSession() {
  const remaining = queue.length - qIdx;
  const newCount  = queue.slice(qIdx).filter(i => i.isNew).length;
  const revCount  = remaining - newCount;
  const againCount = againBuf.length;
  const total      = totalSeen + remaining + againCount;
  const progress   = total > 0 ? (totalSeen / total) * 100 : 0;

  document.getElementById('app').innerHTML = `
    <div class="session-header">
      <span class="pill-count c-again"  title="Again this round">🔴 ${againCount}</span>
      <span class="pill-count c-review" title="Reviews due">📖 ${revCount}</span>
      <span class="pill-count c-new"    title="New cards">✨ ${newCount}</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${progress}%"></div>
    </div>
    <div class="card-wrap" onclick="flipCard()">
      <div class="card-inner" id="ci">
        <div class="card-face front-face" id="cf"></div>
        <div class="card-face back-face"  id="cb"></div>
      </div>
    </div>
    <div class="rating-area" id="ra">
      <p class="rate-prompt">How well did you know it?</p>
      <div class="rate-buttons">
        <button class="rate-btn r-again" onclick="rate(0)">
          <span class="rate-label">Again</span>
          <span class="rate-int" id="ri0"></span>
        </button>
        <button class="rate-btn r-hard" onclick="rate(1)">
          <span class="rate-label">Hard</span>
          <span class="rate-int" id="ri1"></span>
        </button>
        <button class="rate-btn r-good" onclick="rate(2)">
          <span class="rate-label">Good</span>
          <span class="rate-int" id="ri2"></span>
        </button>
        <button class="rate-btn r-easy" onclick="rate(3)">
          <span class="rate-label">Easy</span>
          <span class="rate-int" id="ri3"></span>
        </button>
      </div>
      <p class="kbd-hint">
        <kbd>Space</kbd> flip &nbsp;·&nbsp;
        <kbd>1</kbd> Again &nbsp;<kbd>2</kbd> Hard &nbsp;<kbd>3</kbd> Good &nbsp;<kbd>4</kbd> Easy
      </p>
    </div>`;

  populateCard();
}

function populateCard() {
  const item = queue[qIdx];
  const { card, vFirst } = item;
  const srs  = loadSRS();
  const rec  = getRec(srs, card);

  // Front face
  const cf = document.getElementById('cf');
  if (vFirst) {
    cf.innerHTML = `
      ${card.category ? `<div class="card-category">${esc(card.category)}</div>` : ''}
      <div class="card-tag">Phrasal Verb</div>
      <div class="card-verb">${esc(card.verb)}</div>
      <div class="card-tap-hint">tap to reveal</div>`;
  } else {
    cf.innerHTML = `
      ${card.category ? `<div class="card-category">${esc(card.category)}</div>` : ''}
      <div class="card-tag">Meaning</div>
      <div class="card-meaning">${esc(card.meaning)}</div>
      <div class="card-tap-hint">tap to reveal</div>`;
  }

  // Back face
  const cb = document.getElementById('cb');
  const ex = card.example ? `<div class="card-example">"${esc(card.example)}"</div>` : '';
  if (vFirst) {
    cb.innerHTML = `
      <div class="card-tag">Meaning</div>
      <div class="card-meaning">${esc(card.meaning)}</div>${ex}`;
  } else {
    cb.innerHTML = `
      <div class="card-tag">Phrasal Verb</div>
      <div class="card-verb-ans">${esc(card.verb)}</div>${ex}`;
  }

  // Interval previews
  [0, 1, 2, 3].forEach(q => {
    const el = document.getElementById('ri' + q);
    if (el) el.textContent = q === 0 ? 'now' : fmtInterval(calcNext(rec, q).interval);
  });

  // Rating area + flip state
  document.getElementById('ra').style.display = flipped ? 'block' : 'none';
  document.getElementById('ci').classList.toggle('flipped', flipped);
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('ci').classList.toggle('flipped', flipped);
  document.getElementById('ra').style.display = flipped ? 'block' : 'none';
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadFromUrl() {
  let raw = document.getElementById('csv-url').value.trim();
  if (!raw) return;
  const m   = raw.match(/\/spreadsheets\/d\/([A-Za-z0-9_-]+)/);
  const url = m ? `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv` : raw;
  LS.set('url', raw);
  showStatus('Loading…', '');
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    ingestCSV(await res.text());
  } catch (e) {
    showStatus(
      `Could not load. Publish the sheet first: File → Share → Publish to web → CSV. (${e.message})`,
      'err'
    );
  }
}

function loadFromFile() {
  const file = document.getElementById('csv-file').files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = e => ingestCSV(e.target.result);
  r.readAsText(file);
}

function ingestCSV(text) {
  const lines  = text.trim().split(/\r?\n/);
  const header = parseLine(lines[0]).map(h => h.toLowerCase().trim());
  const col    = name => header.findIndex(h => h.includes(name));
  const iV = col('verb'), iM = col('mean'), iE = col('ex'), iC = col('cat');

  allCards = lines.slice(1)
    .map(l => parseLine(l))
    .filter(c => c.length > 1 && c[iV])
    .map(c => ({
      verb:     c[iV] || '',
      meaning:  iM >= 0 ? c[iM] || '' : '',
      example:  iE >= 0 ? c[iE] || '' : '',
      category: iC >= 0 ? c[iC] || '' : '',
    }));

  populateCategories();
  showStatus(`${allCards.length} cards loaded.`, 'ok', 2500);
  renderApp();
}

function parseLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (const ch of line) {
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
    cur += ch;
  }
  cols.push(cur.trim());
  return cols;
}

function populateCategories() {
  const cats  = [...new Set(allCards.map(c => c.category).filter(Boolean))].sort();
  const sel   = document.getElementById('cat-sel');
  const saved = LS.get('category') || 'all';
  sel.innerHTML = '<option value="all">All categories</option>';
  cats.forEach(cat => {
    const o = document.createElement('option');
    o.value = cat; o.textContent = cat;
    if (cat === saved) o.selected = true;
    sel.appendChild(o);
  });
}

// ── Settings helpers ──────────────────────────────────────────────────────────
function toggleSettings() {
  const t = document.getElementById('strig');
  const p = document.getElementById('spanel');
  const open = p.classList.toggle('open');
  t.classList.toggle('open', open);
}

function setMode(m) {
  mode = m;
  LS.set('mode', m);
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.mode === m));
}

function toggleFilter() {
  useFilter = !useFilter;
  LS.set('useFilter', String(useFilter));
  document.getElementById('fsw').classList.toggle('on', useFilter);
  document.getElementById('flbl').textContent = useFilter ? 'On' : 'Off';
}

function onCatChange() {
  LS.set('category', document.getElementById('cat-sel').value);
}

function resetProgress() {
  if (!confirm('Delete all SRS progress and start over?')) return;
  localStorage.removeItem('pv__srs');
  localStorage.removeItem('pv__newToday');
  showStatus('Progress reset.', 'ok', 2000);
  renderApp();
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (!queue.length || qIdx >= queue.length) return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (flipped) {
    if (e.key === '1') rate(0);
    if (e.key === '2') rate(1);
    if (e.key === '3') rate(2);
    if (e.key === '4') rate(3);
  }
});

// ── Status ────────────────────────────────────────────────────────────────────
let _stimer;
function showStatus(msg, type, ms) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status show' + (type ? ' ' + type : '');
  clearTimeout(_stimer);
  if (ms) _stimer = setTimeout(() => el.classList.remove('show'), ms);
}

// ── Utility ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  mode      = LS.get('mode')      || 'verb-first';
  useFilter = LS.get('useFilter') === 'true';

  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.mode === mode));
  document.getElementById('fsw').classList.toggle('on', useFilter);
  document.getElementById('flbl').textContent = useFilter ? 'On' : 'Off';
  document.getElementById('npd').value = LS.get('npd') || '10';

  const savedUrl = LS.get('url');
  if (savedUrl) {
    document.getElementById('csv-url').value = savedUrl;
    loadFromUrl();
  }
})();
</script>
